version: 2

builds:
  - binary: aha
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

brews:
  - repository:
      owner: suntianxun
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/suntianxun/aha"
    description: "A TUI for showing dependencies of a Python project"
    license: "MIT"
    install: |
      bin.install "aha"
    test: |
      assert_match "Usage:", shell_output("#{bin}/aha 2>&1", 1)
